<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1a2744" stroke-width="0.5"/>
    </pattern>
    <!-- Glow filter for logo -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle glow for accent elements -->
    <filter id="accentGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Radial glow behind logo area -->
    <radialGradient id="centerGlow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" style="stop-color:#1a6a9a; stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0f172a; stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Center glow -->
  <rect width="1200" height="630" fill="url(#centerGlow)"/>

  <!-- Decorative corner accents -->
  <!-- Top-left -->
  <path d="M 0 80 L 0 0 L 80 0" fill="none" stroke="#1a6a9a" stroke-width="3" opacity="0.6"/>
  <path d="M 0 60 L 0 0 L 60 0" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <!-- Top-right -->
  <path d="M 1120 0 L 1200 0 L 1200 80" fill="none" stroke="#1a6a9a" stroke-width="3" opacity="0.6"/>
  <path d="M 1140 0 L 1200 0 L 1200 60" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <!-- Bottom-left -->
  <path d="M 0 550 L 0 630 L 80 630" fill="none" stroke="#1a6a9a" stroke-width="3" opacity="0.6"/>
  <path d="M 0 570 L 0 630 L 60 630" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <!-- Bottom-right -->
  <path d="M 1120 630 L 1200 630 L 1200 550" fill="none" stroke="#1a6a9a" stroke-width="3" opacity="0.6"/>
  <path d="M 1140 630 L 1200 630 L 1200 570" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.3"/>

  <!-- Logo mark: {</> } -->
  <g transform="translate(600, 215)" text-anchor="middle" filter="url(#glow)">
    <!-- Left curly brace { -->
    <text x="-105" y="15" font-family="'Courier New', monospace" font-size="90" font-weight="bold" fill="#1a6a9a">{</text>

    <!-- < angle bracket (gold) -->
    <text x="-38" y="15" font-family="'Courier New', monospace" font-size="80" font-weight="bold" fill="#f5a623">&lt;</text>

    <!-- / slash -->
    <text x="2" y="15" font-family="'Courier New', monospace" font-size="80" font-weight="bold" fill="#e2e8f0">/</text>

    <!-- > angle bracket (gold) -->
    <text x="42" y="15" font-family="'Courier New', monospace" font-size="80" font-weight="bold" fill="#f5a623">&gt;</text>

    <!-- Right curly brace } -->
    <text x="105" y="15" font-family="'Courier New', monospace" font-size="90" font-weight="bold" fill="#1a6a9a">}</text>
  </g>

  <!-- Arabic text: شفرة -->
  <text x="600" y="330" text-anchor="middle" font-family="'Arial', 'Tahoma', sans-serif" font-size="72" font-weight="bold" fill="#1a6a9a" letter-spacing="8" direction="rtl">شفرة</text>

  <!-- English text: SHAFRAH -->
  <text x="600" y="390" text-anchor="middle" font-family="'Arial', 'Helvetica', sans-serif" font-size="42" font-weight="bold" fill="#e2e8f0" letter-spacing="14">SHAFRAH</text>

  <!-- Separator line -->
  <line x1="470" y1="420" x2="730" y2="420" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
  <circle cx="470" cy="420" r="3" fill="#f5a623" opacity="0.6"/>
  <circle cx="730" cy="420" r="3" fill="#f5a623" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="600" y="465" text-anchor="middle" font-family="'Arial', 'Helvetica', sans-serif" font-size="24" fill="#94a3b8" letter-spacing="3">SOFTWARE DEVELOPMENT</text>
  <text x="600" y="500" text-anchor="middle" font-family="'Arial', 'Helvetica', sans-serif" font-size="24" fill="#94a3b8" letter-spacing="3">COMPANY IN QATAR</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="620" width="1200" height="10" fill="#1a6a9a" opacity="0.8"/>
  <rect x="400" y="620" width="400" height="10" fill="#f5a623" opacity="0.6"/>

  <!-- Floating code dots decoration - left side -->
  <circle cx="120" cy="200" r="2" fill="#1a6a9a" opacity="0.4"/>
  <circle cx="150" cy="180" r="1.5" fill="#f5a623" opacity="0.3"/>
  <circle cx="100" cy="250" r="1" fill="#1a6a9a" opacity="0.3"/>
  <circle cx="180" cy="230" r="2.5" fill="#1a6a9a" opacity="0.2"/>
  <circle cx="90" cy="350" r="1.5" fill="#f5a623" opacity="0.25"/>
  <circle cx="160" cy="400" r="2" fill="#1a6a9a" opacity="0.3"/>
  <circle cx="130" cy="450" r="1" fill="#f5a623" opacity="0.2"/>

  <!-- Floating code dots decoration - right side -->
  <circle cx="1080" cy="200" r="2" fill="#1a6a9a" opacity="0.4"/>
  <circle cx="1050" cy="180" r="1.5" fill="#f5a623" opacity="0.3"/>
  <circle cx="1100" cy="250" r="1" fill="#1a6a9a" opacity="0.3"/>
  <circle cx="1020" cy="230" r="2.5" fill="#1a6a9a" opacity="0.2"/>
  <circle cx="1110" cy="350" r="1.5" fill="#f5a623" opacity="0.25"/>
  <circle cx="1040" cy="400" r="2" fill="#1a6a9a" opacity="0.3"/>
  <circle cx="1070" cy="450" r="1" fill="#f5a623" opacity="0.2"/>
</svg>